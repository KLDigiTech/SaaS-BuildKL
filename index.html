<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="Css/style.css" />
  <link rel="stylesheet" href="Css/login.css" />
  <script src="Js/script.js" defer></script>
  <script src="Js/login.js" defer></script>
  <title>BuildKL</title>
</head>

<body>
  <section class="login-section">
    <form class="login" id="loginForm">
      <!-- LOGO -->
      <div class="logo">
        <img src="Logo/logo-clair.png" alt="Logo buildKL" />
      </div>
      <!-- TITRE -->
      <h1>CONNEXION</h1>
      <!-- CHAMPS -->
      <div class="input-group">
        <input type="text" id="identifiant" name="identifiant" placeholder=" " required autocomplete="off">
        <label for="identifiant">Identifiant / Mail </label>
      </div>
      <div class="input-group">
        <input type="password" id="password" name="password" placeholder=" " required autocomplete="off">
        <label for="password">Mot de Passe</label>
      </div>
      <!-- BOUTON CONNEXION -->
      <div class="btn-connexion">
        <button type="submit" id="btnConnexion">Se Connecter</button>
      </div>
      <!-- MOT DE PASSE OUBLIÉ -->
      <div class="forget">
        <a href="#">Mot De Passe Oublié ?</a>
      </div>
      <!-- MESSAGE ERREUR -->
      <div class="erreur-msg" id="erreurMsg">
        ⚠️ Identifiant ou mot de passe incorrect
      </div>
    </form>
  </section>
</body>

</html>
